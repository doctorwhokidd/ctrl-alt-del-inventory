<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ender Lilies Gilmore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container nav-container">
            <a class="site-brand" href="index.html">Ender Lilies Grimoire</a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html" aria-current="page">Home</a>
                <a href="spirits.html">Spirits</a>
                <a href="relics.html">Relics</a>
                <a href="items.html">Items</a>
                <a href="findings.html">Findings</a>
                <a href="map.html">Map</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="login.html" class="nav-login">Log In</a>
            </nav>
        </div>
    </header>

    <h1>Relics</h1>
    <div id="relics-container"></div>
    
    <script>
        fetch("http://127.0.0.1:5001/ender-lilies-api/us-central1/api/relics")
          .then(res => res.json())
          .then(data => {
            const container = document.getElementById("relics-container");
            data.forEach(relic => {
                const div = document.createElement("div");
                div.innerHTML = `
                <h2>${relic.Name}</h2>
                <img src="${relic.Image}" alt="${relic.Name}" />
                <p><strong>Slots:</strong> ${relic.Slots}</p>
                <p><strong>Effects:</strong> ${relic.Effects || "N/A"}</p>
                <p><strong>Location:</strong> ${relic.Location}</p>
                <p><strong>Description:</strong> ${relic.Description}</p>
            `;
                container.appendChild(div);
            });
          });

    </script>
    <script src="script.js"></script>
</body>
</html>
