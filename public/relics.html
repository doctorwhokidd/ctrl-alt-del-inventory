<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Relics | Ender Lilies Grimoire</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="style.css">
	<meta name="description" content="Browse all Relics in Ender Lilies with locations, effects, and tracking.">
</head>
<body class="relics-page">
	<header class="site-header">
		<div class="container nav-container">
			<a class="site-brand" href="index.html">Ender Lilies Grimoire</a>
			<nav class="site-nav" aria-label="Primary navigation">
				<a href="index.html">Home</a>
				<a href="spirits.html">Spirits</a>
				<a href="relics.html" aria-current="page">Relics</a>
				<a href="items.html">Items</a>
				<a href="findings.html">Findings</a>
				<a href="map.html">Map</a>
				<a href="about.html">About</a>
				<a href="contact.html">Contact</a>
				<a href="login.html" class="nav-login">Log In</a>
			</nav>
		</div>
	</header>

	<main class="page-content">
		<div class="container">
			<div class="page-header">
				<h1>Relics</h1>
				<p class="page-subtitle">Track relics, review effects, and inspect where each one is obtained.</p>
				<p id="relics-access-note" class="tracking-mode-note" aria-live="polite"></p>
			</div>

			<div class="collection-toolbar">
				<input id="relics-search" class="collection-search" type="search" placeholder="Search relics, effects, locations..." aria-label="Search relics">
				<span id="relics-meta" class="collection-meta">Loading relics...</span>
			</div>

			<div class="collection-layout">
				<div class="collection-table-section">
					<div class="table-wrapper">
						<table class="collection-table" id="relics-table">
							<colgroup>
								<col class="col-track">
								<col class="col-name">
								<col class="col-skill">
								<col class="col-location">
								<col class="col-found">
							</colgroup>
							<thead>
								<tr>
									<th>Track</th>
									<th>Name</th>
									<th>Effects</th>
									<th>Location</th>
									<th>Found</th>
								</tr>
							</thead>
							<tbody id="relics-tbody">
								<tr>
									<td colspan="5" class="table-loading">Loading relics...</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<div class="collection-detail-shell">
					<div class="collection-mini-panel" id="relics-mini-panel" aria-live="polite">
						<p class="collection-mini-loading">Loading quick dashboard...</p>
					</div>
					<div class="collection-detail-section" id="relic-detail-section">
						<div class="detail-placeholder">
							<p>Select a relic to view details</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="auth-nav.js"></script>
	<script>
		const RELICS_DATA_URL = "data/relics.json";
		const relicsTbody = document.getElementById("relics-tbody");
		const relicDetailSection = document.getElementById("relic-detail-section");
		const relicSearchInput = document.getElementById("relics-search");
		const relicMeta = document.getElementById("relics-meta");
		const relicsAccessNote = document.getElementById("relics-access-note");
		const relicsMiniPanel = document.getElementById("relics-mini-panel");
		let relicsData = [];
		let relicFilter = "";
		let dashboardTotals = null;

		function getProgressKey(baseKey) {
			if (window.Auth && typeof window.Auth.getProgressKey === "function") {
				return window.Auth.getProgressKey(baseKey);
			}
			return null;
		}

		function isTrackingEnabled() {
			return Boolean(window.Auth && typeof window.Auth.isLoggedIn === "function" && window.Auth.isLoggedIn());
		}

		function getTrackingStore() {
			return isTrackingEnabled() ? localStorage : sessionStorage;
		}

		function getTrackingKey(baseKey) {
			const scoped = getProgressKey(baseKey);
			if (scoped) return scoped;
			return `guest_${String(baseKey || "")}`;
		}

		function applyTrackingAccessState() {
			const enabled = isTrackingEnabled();
			const checkboxes = relicsTbody.querySelectorAll(".found-checkbox, .track-checkbox");
			checkboxes.forEach(cb => {
				cb.disabled = false;
				cb.title = enabled ? "" : "Guest mode: progress is temporary for this session";
			});
			if (relicsAccessNote) {
				relicsAccessNote.textContent = enabled
					? "Tracking mode: progress saves to your account."
					: "Guest tracking mode: progress is temporary until you log in.";
			}
			if (!enabled && relicMeta) {
				relicMeta.textContent = "Guest mode active. Log in to save progress for later.";
			}
			renderMiniDashboard();
		}

		async function fetchDashboardCount(url) {
			try {
				const response = await fetch(url, { cache: "force-cache" });
				if (!response.ok) return 0;
				const data = await response.json();
				return Array.isArray(data) ? data.length : 0;
			} catch (_) {
				return 0;
			}
		}

		async function ensureDashboardTotals() {
			if (dashboardTotals) return dashboardTotals;
			const [spirits, relics, items, findings] = await Promise.all([
				fetchDashboardCount("data/spirits.json"),
				fetchDashboardCount("data/relics.json"),
				fetchDashboardCount("data/items.json"),
				fetchDashboardCount("data/findings.json"),
			]);
			dashboardTotals = { spirits, relics, items, findings };
			return dashboardTotals;
		}

		function renderMiniDashboard() {
			if (!relicsMiniPanel || !dashboardTotals || !window.Auth || typeof window.Auth.renderCollectionMiniDashboard !== "function") return;
			window.Auth.renderCollectionMiniDashboard(relicsMiniPanel, dashboardTotals);
		}

		initRelicsPage();
		ensureDashboardTotals().then(renderMiniDashboard);

		async function initRelicsPage() {
			try {
				const response = await fetch(RELICS_DATA_URL, { cache: "force-cache" });
				if (!response.ok) throw new Error(`HTTP ${response.status}`);
				const data = await response.json();
				if (!Array.isArray(data)) throw new Error("Relics JSON is not an array");
				relicsData = data;
				applyRelicFilterAndRender();
			} catch (error) {
				relicsTbody.innerHTML = '<tr><td colspan="5" class="table-error">Failed to load relics data</td></tr>';
				relicMeta.textContent = "Failed to load relics.";
				console.error("Failed to load relics:", error);
			}
		}

		relicSearchInput.addEventListener("input", event => {
			relicFilter = String(event.target.value || "").trim().toLowerCase();
			applyRelicFilterAndRender();
		});

		relicsTbody.addEventListener("change", event => {
			if (event.target.matches(".found-checkbox") || event.target.matches(".track-checkbox")) {
				const checkbox = event.target;
				const row = checkbox.closest("tr[data-index]");
				const index = row ? Number(row.dataset.index) : NaN;
				const relic = !Number.isNaN(index) ? relicsData[index] : null;
				if (relic && window.Auth && typeof window.Auth.recordRecentActivity === "function") {
					window.Auth.recordRecentActivity({
						id: `relics-${checkbox.classList.contains("found-checkbox") ? "found" : "tracked"}-${index}`,
						type: "Relic",
						action: checkbox.classList.contains("found-checkbox")
							? (checkbox.checked ? "Found" : "Unfound")
							: (checkbox.checked ? "Tracked" : "Untracked"),
						name: relic.Name || "Unknown Relic",
						location: relic.Location || "",
						timestamp: Date.now(),
					});
				}
				saveRelicState();
				if (checkbox.matches(".track-checkbox")) {
					reorderByTracked(relicsTbody);
				}
				const actionLabel = checkbox.classList.contains("found-checkbox")
					? (checkbox.checked ? "found" : "unfound")
					: (checkbox.checked ? "tracked" : "untracked");
				if (relic && window.Auth && typeof window.Auth.showNotification === "function") {
					window.Auth.showNotification(`${relic.Name || "Relic"} ${actionLabel}.`);
				}
			}
		});

		function reorderByTracked(tbody) {
			const rows = [...tbody.querySelectorAll("tr[data-index]")];
			const tracked = rows.filter(r => r.querySelector(".track-checkbox")?.checked);
			const untracked = rows.filter(r => !r.querySelector(".track-checkbox")?.checked);
			tracked.forEach(r => r.classList.add("row-tracked"));
			untracked.forEach(r => r.classList.remove("row-tracked"));
			[...tracked, ...untracked].forEach(r => tbody.appendChild(r));
		}

		relicsTbody.addEventListener("click", event => {
			const row = event.target.closest("tr[data-index]");
			if (!row || !relicsTbody.contains(row)) return;
			if (event.target.matches("input[type='checkbox']")) {
				event.stopPropagation();
				return;
			}
			const index = Number(row.dataset.index);
			if (!Number.isNaN(index) && relicsData[index]) {
				showRelicDetail(relicsData[index]);
			}
		});

		function applyRelicFilterAndRender() {
			const matchingIndices = [];
			for (let i = 0; i < relicsData.length; i += 1) {
				const relic = relicsData[i];
				const haystack = `${relic.Name || ""} ${relic.Effects || ""} ${relic.Location || ""} ${relic.Description || ""}`.toLowerCase();
				if (!relicFilter || haystack.includes(relicFilter)) matchingIndices.push(i);
			}
			renderRelicsTable(matchingIndices);
			relicMeta.textContent = `${matchingIndices.length} / ${relicsData.length} relics shown`;
		}

		function renderRelicsTable(indices) {
			if (indices.length === 0) {
				relicsTbody.innerHTML = '<tr><td colspan="5" class="table-error">No relics match your search.</td></tr>';
				return;
			}

			const fragment = document.createDocumentFragment();
			for (const index of indices) {
				const relic = relicsData[index];
				const row = document.createElement("tr");
				const name = relic.Name || "Relic";
				row.dataset.index = String(index);
				row.innerHTML = `
					<td class="track-col"><input type="checkbox" class="track-checkbox" data-key="${escapeAttr(name)}" aria-label="Track ${escapeAttr(name)}"></td>
					<td class="name-col">${escapeHtml(name)}</td>
					<td class="skill-col">${escapeHtml(relic.Effects || "N/A")}</td>
					<td class="location-col">${escapeHtml(relic.Location || "N/A")}</td>
					<td class="found-col"><input type="checkbox" class="found-checkbox" data-key="${escapeAttr(name)}" aria-label="Mark ${escapeAttr(name)} as found"></td>
				`;
				fragment.appendChild(row);
			}

			relicsTbody.innerHTML = "";
			relicsTbody.appendChild(fragment);
			restoreRelicState();
			applyTrackingAccessState();
		}

		function showRelicDetail(relic) {
			const name = relic.Name || "Unknown Relic";
			const fallback = getPlaceholderImage(name, 240);
			relicDetailSection.innerHTML = `
				<div class="detail-card">
					<div class="detail-image-section">
						<img src="${fallback}" data-src-raw="${escapeAttr(relic.Image || "")}" alt="${escapeAttr(name)}" class="detail-image" loading="lazy" decoding="async">
					</div>
					<div class="detail-info-section">
						<div class="detail-header">
							<h2>${escapeHtml(name)}</h2>
							<p><strong>Slots:</strong> ${escapeHtml(String(relic.Slots ?? "N/A"))}</p>
							<p class="detail-skill"><strong>Effects:</strong> ${escapeHtml(relic.Effects || "N/A")}</p>
						</div>
						<div class="detail-content">
							<p><strong>Location:</strong> ${escapeHtml(relic.Location || "N/A")}</p>
						</div>
					</div>
					<div class="detail-lore">
						<p><strong>Description:</strong></p>
						<p>${escapeHtml(relic.Description || "No description available.")}</p>
					</div>
				</div>
			`;

			const detailImage = relicDetailSection.querySelector("img.detail-image[data-src-raw]");
			if (detailImage) loadImageWithFallback(detailImage, detailImage.dataset.srcRaw || "", name, 240);
		}

		function hydrateRelicImages() {
			const icons = relicsTbody.querySelectorAll("img.spirit-icon[data-src-raw]");
			icons.forEach(icon => {
				const raw = icon.dataset.srcRaw || "";
				const name = (icon.getAttribute("alt") || "Relic icon").replace(/\s+icon$/i, "") || "Relic";
				loadImageWithFallback(icon, raw, name, 40);
			});
		}

		function loadImageWithFallback(imgElement, rawUrl, label, size) {
			const fallback = getPlaceholderImage(label || "Relic", size || 120);
			const candidates = getImageCandidates(rawUrl, label || "Relic");
			if (candidates.length === 0) {
				imgElement.src = fallback;
				return;
			}

			let i = 0;
			const tryNext = () => {
				if (i >= candidates.length) {
					imgElement.src = fallback;
					return;
				}
				const candidate = candidates[i++];
				const probe = new Image();
				probe.onload = () => { imgElement.src = candidate; };
				probe.onerror = () => { tryNext(); };
				probe.src = candidate;
			};

			imgElement.src = fallback;
			tryNext();
		}

		function getImageCandidates(rawUrl, label) {
			const trimmed = String(rawUrl || "").trim();
			if (!trimmed) return [];
			const candidates = [];
			const primary = resolveImageUrl(trimmed, label || "Relic");
			if (primary) candidates.push(primary);
			const redirect = resolveFandomRedirectFileUrl(trimmed);
			if (redirect && !candidates.includes(redirect)) candidates.push(redirect);
			if (!candidates.includes(trimmed)) candidates.push(trimmed);
			return candidates;
		}

		function resolveImageUrl(rawUrl, label) {
			if (!rawUrl || typeof rawUrl !== "string") {
				return getPlaceholderImage(label || "Relic", 120);
			}
			const trimmed = rawUrl.trim();
			if (!trimmed) return getPlaceholderImage(label || "Relic", 120);
			if (trimmed.startsWith("data:") || trimmed.startsWith("blob:")) return trimmed;
			try {
				const parsedUrl = new URL(trimmed, window.location.origin);
				const filePathPrefix = "/wiki/File:";
				if (parsedUrl.pathname.startsWith(filePathPrefix)) {
					const fileName = decodeURIComponent(parsedUrl.pathname.slice(filePathPrefix.length));
					return `${parsedUrl.origin}/wiki/Special:FilePath/${encodeURIComponent(fileName)}`;
				}
				return parsedUrl.href;
			} catch (_error) {
				return getPlaceholderImage(label || "Relic", 120);
			}
		}

		function resolveFandomRedirectFileUrl(rawUrl) {
			if (!rawUrl || typeof rawUrl !== "string") return "";
			try {
				const parsedUrl = new URL(rawUrl.trim(), window.location.origin);
				const filePathPrefix = "/wiki/File:";
				if (!parsedUrl.pathname.startsWith(filePathPrefix)) return "";
				const fileName = decodeURIComponent(parsedUrl.pathname.slice(filePathPrefix.length));
				return `${parsedUrl.origin}/wiki/Special:Redirect/file/${encodeURIComponent(fileName)}`;
			} catch (_error) {
				return "";
			}
		}

		function saveRelicState() {
			const tracked = [];
			const found = [];
			document.querySelectorAll("#relics-tbody .track-checkbox:checked").forEach(cb => tracked.push(cb.dataset.key));
			document.querySelectorAll("#relics-tbody .found-checkbox:checked").forEach(cb => found.push(cb.dataset.key));
			const trackedKey = getTrackingKey("relics_tracked");
			const foundKey = getTrackingKey("relics_found");
			if (!trackedKey || !foundKey) return;
			const store = getTrackingStore();
			store.setItem(trackedKey, JSON.stringify(tracked));
			store.setItem(foundKey, JSON.stringify(found));
			renderMiniDashboard();
		}

		function restoreRelicState() {
			try {
				const trackedKey = getTrackingKey("relics_tracked");
				const foundKey = getTrackingKey("relics_found");
				if (!trackedKey || !foundKey) return;
				const store = getTrackingStore();
				const tracked = JSON.parse(store.getItem(trackedKey) || "[]");
				const found = JSON.parse(store.getItem(foundKey) || "[]");
				tracked.forEach(key => {
					const cb = relicsTbody.querySelector(`.track-checkbox[data-key="${cssEscape(String(key))}"]`);
					if (cb) cb.checked = true;
				});
				found.forEach(key => {
					const cb = relicsTbody.querySelector(`.found-checkbox[data-key="${cssEscape(String(key))}"]`);
					if (cb) cb.checked = true;
				});
				reorderByTracked(relicsTbody);
			} catch (_) {}
		}

		function cssEscape(value) {
			if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
			return String(value).replace(/(["\\#.:\[\]\(\)])/g, "\\$1");
		}

		function getPlaceholderImage(name, size) {
			const safeName = String(name || "Relic").trim();
			const initials = safeName
				.split(/\s+/)
				.filter(Boolean)
				.slice(0, 2)
				.map(part => part[0].toUpperCase())
				.join("") || "RE";
			const svg = `
				<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="${safeName}">
					<defs>
						<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
							<stop offset="0%" stop-color="#1a2238"/>
							<stop offset="100%" stop-color="#33415f"/>
						</linearGradient>
					</defs>
					<rect width="100%" height="100%" fill="url(#g)" rx="10" ry="10"/>
					<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#dbe2f3" font-family="Arial, sans-serif" font-size="${Math.max(12, Math.floor(size * 0.32))}" font-weight="700">${initials}</text>
				</svg>
			`;
			return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
		}

		function escapeHtml(value) {
			return String(value ?? "")
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;");
		}

		function escapeAttr(value) {
			return String(value ?? "")
				.replace(/&/g, "&amp;")
				.replace(/"/g, "&quot;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;");
		}

		window.addEventListener("storage", event => {
			if (!event.key || event.key.includes("_found") || event.key.includes("_tracked") || event.key.includes("recent_activity") || event.key === "elg_session_v1") {
				renderMiniDashboard();
			}
		});

		window.addEventListener("focus", () => {
			renderMiniDashboard();
		});

		window.addEventListener("elg-progress-changed", () => {
			applyRelicFilterAndRender();
			renderMiniDashboard();
		});
	</script>
</body>
</html>
