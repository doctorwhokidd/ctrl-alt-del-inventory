		const MAP_BASE_SIZE = { width: 1400, height: 795 };
		const MAP_OVERRIDES_BASE_KEY = "map_location_overrides_v1";
		let manualPinpoints = loadManualPinpoints();

		function getProgressKey(baseKey) {
			if (window.Auth && typeof window.Auth.getProgressKey === "function") {
				return window.Auth.getProgressKey(baseKey);
			}
			return null;
		}

		function isTrackingEnabled() {
			return Boolean(window.Auth && typeof window.Auth.isLoggedIn === "function" && window.Auth.isLoggedIn());
		}

		function loadManualPinpoints() {
			const overrideKey = getProgressKey(MAP_OVERRIDES_BASE_KEY);
			const keyCandidates = Array.from(new Set([
				overrideKey,
				MAP_OVERRIDES_BASE_KEY,
			].filter(Boolean)));

			const cleaned = {};
			keyCandidates.forEach(key => {
				try {
					const raw = JSON.parse(localStorage.getItem(key) || "{}");
					Object.entries(raw).forEach(([code, coords]) => {
						const normalized = String(code || "").trim().toUpperCase();
						if (!Array.isArray(coords) || coords.length < 2) return;
						const x = Number(coords[0]);
						const y = Number(coords[1]);
						if (!Number.isFinite(x) || !Number.isFinite(y)) return;
						if (!cleaned[normalized]) {
							cleaned[normalized] = [
								Math.max(0, Math.min(MAP_BASE_SIZE.width, x)),
								Math.max(0, Math.min(MAP_BASE_SIZE.height, y)),
							];
						}
					});
				} catch (_) {}
			});

			return cleaned;
		}

		function toHardcodedPixel(locationCode) {
			const normalizedCode = String(locationCode || "").trim().toUpperCase();
			if (manualPinpoints[normalizedCode]) {
				return manualPinpoints[normalizedCode];
			}
			return null;
		}

		function getStoredArray(baseKey) {
			const scopedKey = getProgressKey(baseKey);
			const guestKey = `guest_${String(baseKey || "")}`;

			if (!isTrackingEnabled()) {
				try {
					const guestValue = JSON.parse(sessionStorage.getItem(guestKey) || "[]");
					return Array.isArray(guestValue) ? guestValue : [];
				} catch (_) {
					return [];
				}
			}

			const keyCandidates = Array.from(new Set([scopedKey, baseKey].filter(Boolean)));
			for (const key of keyCandidates) {
				try {
					const value = JSON.parse(localStorage.getItem(key) || "[]");
					if (Array.isArray(value) && value.length > 0) return value;
				} catch (_) {}
			}

			try {
				const fallback = JSON.parse(localStorage.getItem(keyCandidates[0] || "") || "[]");
				return Array.isArray(fallback) ? fallback : [];
			} catch (_) {
				return [];
			}
		}

		function normalizeLocationCode(value) {
			return String(value || "").trim().toUpperCase();
		}

		function extractLocationCodes(rawValue) {
			const text = String(rawValue || "").toUpperCase();
			const matches = text.match(/[A-Z]+\d+/g) || [];
			return Array.from(new Set(matches.filter(code => MAP_COORDS[code])));
		}

		function getSpiritFoundEntries(spiritsData) {
			const results = [];
			const foundLocations = getStoredArray("spirits_found_locations")
				.map(normalizeLocationCode)
				.filter(code => code && MAP_COORDS[code]);

			if (foundLocations.length > 0) {
				foundLocations.forEach(code => {
					const match = Array.isArray(spiritsData)
						? spiritsData.find(spirit => normalizeLocationCode(spirit.Location) === code)
						: null;
					results.push({
						type: "Spirit",
						name: match && match.Name ? match.Name : "Unknown Spirit",
						code,
					});
				});
				return results;
			}

			// Legacy fallback for older index-based spirit saves.
			const indices = Array.from(new Set(getStoredArray("spirits_found").filter(Number.isInteger)));
			indices.forEach(index => {
				const spirit = Array.isArray(spiritsData) ? spiritsData[index] : null;
				if (!spirit) return;
				const code = normalizeLocationCode(spirit.Location);
				if (!MAP_COORDS[code]) return;
				results.push({
					type: "Spirit",
					name: spirit.Name || "Unknown Spirit",
					code,
				});
			});

			return results;
		}

		function getNamedFoundEntries(foundKey, data, type, locationField) {
			if (!Array.isArray(data)) return [];
			const foundNames = new Set(
				getStoredArray(foundKey)
					.map(value => String(value || "").trim())
					.filter(Boolean)
			);
			if (foundNames.size === 0) return [];

			const results = [];
			data.forEach(entry => {
				const name = String(entry && entry.Name ? entry.Name : "").trim();
				if (!name || !foundNames.has(name)) return;
				extractLocationCodes(entry[locationField]).forEach(code => {
					results.push({ type, name, code });
				});
			});
			return results;
		}

		function getAllFoundEntries(spiritsData, relicsData, itemsData, findingsData) {
			if (!isTrackingEnabled()) return [];

			return [
				...getSpiritFoundEntries(spiritsData),
				...getNamedFoundEntries("relics_found", relicsData, "Relic", "Location"),
				...getNamedFoundEntries("items_found", itemsData, "Item", "Locations"),
				...getNamedFoundEntries("findings_found", findingsData, "Finding", "Location"),
			];
		}

		function getFoundStats(spiritsData, relicsData, itemsData, findingsData) {
			const spiritFoundIndices = Array.from(new Set(getStoredArray("spirits_found").filter(Number.isInteger)));
			const spiritFoundLocations = Array.from(new Set(
				getStoredArray("spirits_found_locations")
					.map(normalizeLocationCode)
					.filter(code => code && MAP_COORDS[code])
			));
			const spiritFoundCount = spiritFoundIndices.length > 0 ? spiritFoundIndices.length : spiritFoundLocations.length;
			const relicFoundCount = getStoredArray("relics_found").length;
			const itemFoundCount = getStoredArray("items_found").length;
			const findingFoundCount = getStoredArray("findings_found").length;

			return {
				spiritFoundCount,
				relicFoundCount,
				itemFoundCount,
				findingFoundCount,
				totalFoundCount: spiritFoundCount + relicFoundCount + itemFoundCount + findingFoundCount,
				totalRecords:
					(Array.isArray(spiritsData) ? spiritsData.length : 0) +
					(Array.isArray(relicsData) ? relicsData.length : 0) +
					(Array.isArray(itemsData) ? itemsData.length : 0) +
					(Array.isArray(findingsData) ? findingsData.length : 0),
			};
		}

		function renderFoundPins(pinLayer, mapImage, counter, spiritsData, relicsData, itemsData, findingsData) {
			if (!isTrackingEnabled()) {
				if (counter) counter.textContent = "Log in to view your found locations on the map.";
				if (pinLayer) pinLayer.querySelectorAll(".map-spirit-pin").forEach(pin => pin.remove());
				return;
			}

			const foundEntries = getAllFoundEntries(spiritsData, relicsData, itemsData, findingsData);
			const locationsByCode = new Map();
			foundEntries.forEach(entry => {
				if (!entry || !entry.code) return;
				if (!locationsByCode.has(entry.code)) locationsByCode.set(entry.code, []);
				locationsByCode.get(entry.code).push(entry);
			});

			const foundLocations = Array.from(locationsByCode.keys());
			const pinnedLocations = foundLocations.filter(locationCode => Boolean(toHardcodedPixel(locationCode)));
			const stats = getFoundStats(spiritsData, relicsData, itemsData, findingsData);
			const remainingCount = Math.max(0, stats.totalRecords - stats.totalFoundCount);

			if (counter) {
				counter.textContent = `Found ${stats.totalFoundCount} / ${stats.totalRecords} (${remainingCount} remaining) | ${stats.spiritFoundCount} spirits, ${stats.relicFoundCount} relics, ${stats.itemFoundCount} items, ${stats.findingFoundCount} findings`;
			}

			if (!pinLayer || !mapImage) return;

			const renderedWidth = mapImage.clientWidth;
			const renderedHeight = mapImage.clientHeight;
			if (!renderedWidth || !renderedHeight) return;

			const scaleX = renderedWidth / MAP_BASE_SIZE.width;
			const scaleY = renderedHeight / MAP_BASE_SIZE.height;

			pinLayer.querySelectorAll(".map-spirit-pin").forEach(pin => pin.remove());

			pinnedLocations.forEach(locationCode => {
				const coordsPx = toHardcodedPixel(locationCode);
				if (!coordsPx) return;
				const entriesAtCode = locationsByCode.get(locationCode) || [];
				const x = coordsPx[0] * scaleX;
				const y = coordsPx[1] * scaleY;

				const pin = document.createElement("span");
				pin.className = "map-spirit-pin";
				pin.style.left = x.toFixed(2) + "px";
				pin.style.top = y.toFixed(2) + "px";
				if (entriesAtCode.length > 0) {
					const labels = entriesAtCode.map(entry => `${entry.type}: ${entry.name}`);
					pin.title = `${locationCode} \u2014 ${labels.join(" | ")}`;
				} else {
					pin.title = `Found location ${locationCode}`;
				}
				pinLayer.appendChild(pin);
			});
		}

		async function initMap() {
			const pinLayer = document.getElementById("map-pin-layer");
			const mapImage = document.getElementById("map-full-image");
			const counter = document.getElementById("map-found-counter");
			let spiritsData = [];
			let relicsData = [];
			let itemsData = [];
			let findingsData = [];

			try {
				const [spiritsRes, relicsRes, itemsRes, findingsRes] = await Promise.all([
					fetch("data/spirits.json", { cache: "force-cache" }),
					fetch("data/relics.json", { cache: "force-cache" }),
					fetch("data/items.json", { cache: "force-cache" }),
					fetch("data/findings.json", { cache: "force-cache" }),
				]);

				if (spiritsRes.ok) spiritsData = await spiritsRes.json();
				if (relicsRes.ok) relicsData = await relicsRes.json();
				if (itemsRes.ok) itemsData = await itemsRes.json();
				if (findingsRes.ok) findingsData = await findingsRes.json();
			} catch (_) {}

			const repaintPins = () => renderFoundPins(pinLayer, mapImage, counter, spiritsData, relicsData, itemsData, findingsData);

			repaintPins();

			if (mapImage) {
				if (mapImage.complete) {
					repaintPins();
				} else {
					mapImage.addEventListener("load", repaintPins, { once: true });
				}
			}

			window.addEventListener("storage", event => {
				if (
					event.key === null ||
					event.key.includes("spirits_found") ||
					event.key.includes("relics_found") ||
					event.key.includes("items_found") ||
					event.key.includes("findings_found") ||
					event.key.includes(MAP_OVERRIDES_BASE_KEY) ||
					event.key === "elg_session_v1"
				) {
					manualPinpoints = loadManualPinpoints();
					repaintPins();
				}
			});

			window.addEventListener("focus", () => {
				repaintPins();
			});

			window.addEventListener("resize", () => {
				repaintPins();
			});
		}

		initMap();
	</script>
